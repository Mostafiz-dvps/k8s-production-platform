apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: frontend
          # Image tag is pinned to a specific version (v1.0.0) rather than "latest"
          # to ensure deployments are reproducible and rollbacks are predictable.
          # In the real CI/CD pipeline (see .github/workflows/deploy.yml), this tag
          # would be dynamically set to the git commit SHA at build time and
          # substituted here via Kustomize, Helm, or a sed/CI step before `kubectl apply`.
          image: ghcr.io/mostafiz-dvps/frontend:v1.0.0
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_URL
              value: http://backend:8080
          readinessProbe:
            # Readiness prevents traffic from reaching the pod until nginx is serving the site.
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            # Liveness checks keep Kubernetes restarting the pod if the web server stops responding.
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            # Requests and limits keep the frontend lightweight and predictable on shared nodes.
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
