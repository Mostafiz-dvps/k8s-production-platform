# The browser only ever talks to one public hostname through this Ingress.
# Requests to / go to the frontend Service, while /api and /api/* are routed internally
# to the backend Service. The backend therefore stays private and does not need its own
# public DNS name.
#
# In production, pair this Ingress with cert-manager for automatic TLS certificates.
# Example annotation (commented out intentionally):
# cert-manager.io/cluster-issuer: letsencrypt-prod
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rewrite is not required for this simple root path routing case, so it is omitted.
spec:
  ingressClassName: nginx
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
