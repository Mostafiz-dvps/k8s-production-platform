apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: backend
          # Image tag is pinned to a specific version (v1.0.0) rather than "latest"
          # to ensure deployments are reproducible and rollbacks are predictable.
          # In the real CI/CD pipeline (see .github/workflows/deploy.yml), this tag
          # would be dynamically set to the git commit SHA at build time and
          # substituted here via Kustomize, Helm, or a sed/CI step before `kubectl apply`.
          image: ghcr.io/mostafiz-dvps/backend:v1.0.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            # Readiness decides when the pod is ready to receive traffic from the Service.
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            # Liveness restarts the container if the health endpoint stops responding correctly.
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            # Requests reserve baseline capacity; limits cap the container's maximum usage.
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
