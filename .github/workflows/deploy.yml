name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Check out the repository so the workflow can access the backend source code.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install the Node.js runtime needed for npm ci and npm test.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # Install pinned backend dependencies from package-lock.json.
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Run the backend test suite before any image build or publish step.
      - name: Run backend tests
        working-directory: backend
        run: npm test

  build-and-push:
    name: Build, push images, and create release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}

    steps:
      # Check out the repository again because each job starts in a fresh runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Derive the short git SHA plus deterministic GHCR image names for backend and frontend.
      - name: Derive image metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BACKEND_IMAGE="ghcr.io/${OWNER_LC}/${REPO_NAME}-backend"
          FRONTEND_IMAGE="ghcr.io/${OWNER_LC}/${REPO_NAME}-frontend"

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"

      # Authenticate Docker to GitHub Container Registry using the workflow's GITHUB_TOKEN.
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Build the backend image and tag it with both latest and the short git SHA.
      - name: Build backend Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.backend_image }}:latest" \
            -t "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.short_sha }}" \
            ./backend

      # Build the frontend image and tag it with both latest and the short git SHA.
      - name: Build frontend Docker image
        run: |
          docker build \
            -t "${{ steps.meta.outputs.frontend_image }}:latest" \
            -t "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.short_sha }}" \
            ./frontend

      # Push both backend tags to GHCR so latest and commit-specific versions are available.
      - name: Push backend Docker image tags
        run: |
          docker push "${{ steps.meta.outputs.backend_image }}:latest"
          docker push "${{ steps.meta.outputs.backend_image }}:${{ steps.meta.outputs.short_sha }}"

      # Push both frontend tags to GHCR so latest and commit-specific versions are available.
      - name: Push frontend Docker image tags
        run: |
          docker push "${{ steps.meta.outputs.frontend_image }}:latest"
          docker push "${{ steps.meta.outputs.frontend_image }}:${{ steps.meta.outputs.short_sha }}"

      # Create a GitHub Release named after the short git SHA; this workflow only runs on pushes to main.
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.meta.outputs.short_sha }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.meta.outputs.short_sha }} already exists. Skipping creation."
          else
            gh release create "${{ steps.meta.outputs.short_sha }}" \
              --target "${GITHUB_SHA}" \
              --title "${{ steps.meta.outputs.short_sha }}" \
              --notes "Container images published for commit ${{ steps.meta.outputs.short_sha }}."
          fi

  deploy:
    name: Mock deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      # Mock the deployment stage by showing which backend and frontend image tags would be deployed.
      - name: Echo mock deployment message
        run: echo "Deploying backend:${{ needs.build-and-push.outputs.image_tag }} and frontend:${{ needs.build-and-push.outputs.image_tag }} to Kubernetes cluster"
